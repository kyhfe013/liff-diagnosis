<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断システムへ移動中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #ffffff;
      color: #333;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #06C755;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p class="status-text" id="statusMsg">診断の準備をしています...</p>
  </div>

  <script>
    // --- 【設定】 ---
    const LIFF_ID = '2009681707-aeBPijva'; 
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdxQuguSHHo3ltuOfIuYeKSrrYIQuLm1YTzRWdnOO_BE09eNg/viewform'; 
    
    const ENTRY_ID_UID = 'entry.298464274';   // UID用のID
    const ENTRY_ID_NAME = 'entry.732633067';  // 名前用のID
    // -----------------------

    async function main() {
      const msg = document.getElementById('statusMsg');
      try {
        // 1. LIFF初期化
        await liff.init({ liffId: LIFF_ID });

        // 2. ログインチェック
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          // 3. プロフィール取得
          const profile = await liff.getProfile();
          const userId = profile.userId;
          const displayName = encodeURIComponent(profile.displayName);
          
          // 4. URL組み立て
          const finalUrl = `${FORM_URL}?${ENTRY_ID_UID}=${userId}&${ENTRY_ID_NAME}=${displayName}`;
          
          msg.innerText = "ページを移動しています...";
          
          // 5. 自動遷移（履歴を残さない replace を推奨）
          window.location.replace(finalUrl);
        }
      } catch (err) {
        msg.innerText = "エラーが発生しました。";
        alert('LIFF Error: ' + err.message);
      }
    }

    // 実行
    main();
  </script>
</body>
</html>
